name: JS x Dependency

on:
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  packages: read
  actions: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Angular Project and Run PSE

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.11.0"

          # Setup PSE
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.dev.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          #mode: "docker-intercept"

      # Install project dependencies
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: show dependency tree
        run: npm ls --all

      # Cleanup PSE
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"
